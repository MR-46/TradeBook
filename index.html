<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeBook — Billing & Inventory</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --sidebar-bg: #0C447C;
    --sidebar-hover: #0d5299;
    --sidebar-active: #1a6fcc;
    --accent: #2196F3;
    --accent-light: #E3F2FD;
    --success: #2e7d32;
    --success-bg: #E8F5E9;
    --danger: #c62828;
    --danger-bg: #FFEBEE;
    --warning: #f57f17;
    --warning-bg: #FFF8E1;
    --text: #1a1a2e;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --surface: #ffffff;
    --bg: #f0f4f8;
    --radius: 10px;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
    font-size: 14px;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 230px;
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .sidebar-brand {
    padding: 22px 20px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .sidebar-brand h1 {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .sidebar-brand p {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
    font-family: 'DM Mono', monospace;
  }

  .sidebar-nav {
    flex: 1;
    padding: 12px 0;
  }

  .nav-section {
    padding: 10px 16px 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    color: rgba(255,255,255,0.75);
    cursor: pointer;
    transition: all 0.15s;
    font-size: 13.5px;
    font-weight: 500;
    border-left: 3px solid transparent;
  }

  .nav-item:hover {
    background: rgba(255,255,255,0.08);
    color: #fff;
  }

  .nav-item.active {
    background: rgba(255,255,255,0.12);
    color: #fff;
    border-left-color: #60b3ff;
  }

  .nav-item svg { flex-shrink: 0; opacity: 0.8; }
  .nav-item.active svg { opacity: 1; }

  /* ── MAIN ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .topbar-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .topbar-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

  .topbar-actions { display: flex; gap: 10px; align-items: center; }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
  }

  /* ── CARDS ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }

  .stat-card .label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .stat-card .value {
    font-size: 26px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    letter-spacing: -1px;
    color: var(--text);
  }

  .stat-card .sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .stat-card.accent .value { color: var(--accent); }
  .stat-card.success .value { color: var(--success); }
  .stat-card.danger .value { color: var(--danger); }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 7px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #1976D2; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { background: #1b5e20; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #b71c1c; }
  .btn-outline { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
  .btn-outline:hover { background: var(--accent-light); }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1.5px solid var(--border); }
  .btn-ghost:hover { border-color: #aaa; color: var(--text); }
  .btn-sm { padding: 5px 11px; font-size: 12px; }
  .btn-xs { padding: 3px 8px; font-size: 11px; border-radius: 5px; }

  /* ── TABLE ── */
  .table-wrap {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    overflow: hidden;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .table-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    flex-wrap: wrap;
  }

  .table-header h3 { font-size: 15px; font-weight: 700; }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    text-align: left;
    padding: 11px 16px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-muted);
    background: #f8fafc;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13.5px;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafcff; }

  .mono { font-family: 'DM Mono', monospace; font-size: 13px; }

  /* ── BADGES ── */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-success { background: var(--success-bg); color: var(--success); }
  .badge-danger { background: var(--danger-bg); color: var(--danger); }
  .badge-warning { background: var(--warning-bg); color: var(--warning); }
  .badge-info { background: var(--accent-light); color: #1565C0; }
  .badge-muted { background: #f3f4f6; color: #6b7280; }

  /* ── FORM ── */
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-control {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    font-size: 13.5px;
    font-family: inherit;
    color: var(--text);
    background: #fff;
    transition: border-color 0.15s;
    outline: none;
  }
  .form-control:focus { border-color: var(--accent); }
  select.form-control { cursor: pointer; }
  .form-row { display: grid; gap: 14px; }
  .form-row.cols-2 { grid-template-columns: 1fr 1fr; }
  .form-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-row.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 14px;
    box-shadow: var(--shadow-lg);
    width: 100%;
    max-width: 760px;
    max-height: 94vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .modal-lg { max-width: 1100px; max-height: 96vh; }
  .modal-header {
    padding: 22px 28px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h2 { font-size: 17px; font-weight: 700; }
  .modal-close { cursor: pointer; color: var(--text-muted); font-size: 20px; line-height: 1; border: none; background: none; padding: 2px; }
  .modal-body { padding: 22px 28px; flex: 1; }
  .modal-footer { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

  /* ── INVOICE ITEMS ── */
  .items-table { width: 100%; border-collapse: collapse; border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden; }
  .items-table th { background: #f8fafc; padding: 10px 10px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
  .items-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
  .items-table tr:last-child td { border-bottom: none; }
  .items-table input, .items-table select { width: 100%; padding: 7px 8px; border: 1.5px solid transparent; border-radius: 5px; font-size: 13.5px; font-family: inherit; background: transparent; outline: none; }
  .items-table input:focus, .items-table select:focus { border-color: var(--accent); background: #fff; }

  /* ── SEARCH ── */
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
  .search-wrap input { padding-left: 34px; }

  /* ── SECTION CARD ── */
  .section-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 20px;
  }
  .section-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: var(--text); }

  /* ── DASHBOARD RECENT ── */
  .txn-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .txn-item:last-child { border-bottom: none; }
  .txn-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .txn-dot.sale { background: var(--accent); }
  .txn-dot.purchase { background: var(--warning); }
  .txn-dot.return { background: var(--danger); }
  .txn-info { flex: 1; }
  .txn-info .name { font-weight: 600; font-size: 13px; }
  .txn-info .meta { font-size: 11px; color: var(--text-muted); }
  .txn-amount { font-family: 'DM Mono', monospace; font-weight: 600; font-size: 13px; }

  /* ── INPUT GROUP ── */
  .input-group { display: flex; gap: 8px; }
  .input-group .form-control { flex: 1; }

  /* ── ALERT ── */
  .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
  .alert-info { background: var(--accent-light); color: #1565C0; border: 1px solid #90CAF9; }
  .alert-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid #EF9A9A; }
  .alert-warning { background: var(--warning-bg); color: var(--warning); border: 1px solid #FFE082; }

  /* ── DIVIDER ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

  /* ── LEDGER ── */
  .ledger-table th, .ledger-table td { font-size: 12.5px; padding: 9px 12px; }
  .cr { color: var(--success); }
  .dr { color: var(--danger); }

  /* ── PRINT ── */
  @media print {
    #sidebar, .topbar, .no-print, .btn, #bottom-nav, #fab, #menu-btn, #sidebar-overlay { display: none !important; }
    body { display: block; background: #fff; height: auto; overflow: visible; }
    #main { display: block; overflow: visible; }
    .content { padding: 0; overflow: visible; }
    .print-area { display: block !important; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }

  .print-invoice {
    display: none;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── MISC ── */
  .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
  .empty-state svg { opacity: 0.3; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  .total-row td { font-weight: 700; background: #f8fafc !important; border-top: 2px solid var(--border) !important; }

  .tag { display: inline-flex; gap: 4px; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

  .actions-col { display: flex; gap: 6px; flex-wrap: wrap; }

  .balance-box {
    background: var(--sidebar-bg);
    color: #fff;
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    gap: 32px;
    align-items: center;
  }
  .balance-box .bb-item .lbl { font-size: 11px; opacity: 0.6; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; }
  .balance-box .bb-item .val { font-size: 22px; font-weight: 700; font-family: 'DM Mono', monospace; margin-top: 2px; }

  .report-month-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    background: var(--surface);
    padding: 14px 20px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

  /* ══════════════════════════════════════════════
     MOBILE RESPONSIVE — Bottom Nav + Drawer
  ══════════════════════════════════════════════ */

  /* Mobile sidebar overlay */
  #sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
  }
  #sidebar-overlay.show { display: block; }

  /* Bottom nav bar (mobile only) */
  #bottom-nav {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--sidebar-bg);
    z-index: 300;
    padding: 0;
    padding-bottom: env(safe-area-inset-bottom);
    box-shadow: 0 -2px 12px rgba(0,0,0,0.2);
  }

  .bottom-nav-inner {
    display: flex;
    align-items: stretch;
    height: 58px;
  }

  .bn-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    font-size: 10px;
    font-weight: 600;
    padding: 6px 4px;
    border: none;
    background: none;
    font-family: inherit;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .bn-item.active { color: #fff; background: rgba(255,255,255,0.12); }
  .bn-item svg { width: 20px; height: 20px; }

  /* Menu hamburger button in topbar (mobile) */
  #menu-btn {
    display: none;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    border: none;
    background: var(--bg);
    border-radius: 8px;
    cursor: pointer;
    color: var(--text);
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  /* FAB — floating action button (mobile) */
  #fab {
    display: none; /* shown only on mobile via media query */
    position: fixed;
    bottom: 70px;
    right: 18px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    border: none;
    font-size: 26px;
    line-height: 1;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(33,150,243,0.45);
    z-index: 250;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s;
  }
  #fab:active { transform: scale(0.93); }

  @media (max-width: 768px) {
    #sidebar-close-btn { display: flex !important; align-items: center; justify-content: center; }

    /* Hide desktop sidebar */
    #sidebar {
      position: fixed;
      left: -240px;
      top: 0;
      bottom: 0;
      z-index: 210;
      transition: left 0.25s ease;
      width: 240px;
    }
    #sidebar.open { left: 0; }

    /* Show mobile elements */
    #bottom-nav { display: block; }
    #menu-btn { display: flex; }
    #fab { display: flex; }

    /* Body takes full width, add bottom padding for nav */
    body { display: block; height: 100vh; overflow: hidden; }
    #main {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Topbar tweaks */
    .topbar {
      padding: 10px 14px;
      gap: 10px;
    }
    .topbar-title { font-size: 16px; }
    .topbar-subtitle { display: none; }
    .topbar-actions { gap: 6px; }
    .topbar-actions .btn { padding: 7px 10px; font-size: 12px; }

    /* Content padding + bottom nav space */
    .content {
      padding: 14px;
      padding-bottom: calc(70px + env(safe-area-inset-bottom));
    }

    /* Cards stack 2 per row on mobile */
    .cards-grid {
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat-card { padding: 14px; }
    .stat-card .value { font-size: 20px; }
    .stat-card .label { font-size: 10px; }

    /* Two-col stacks */
    .two-col { grid-template-columns: 1fr; gap: 14px; }
    .three-col { grid-template-columns: 1fr; gap: 14px; }

    /* Tables — horizontal scroll */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { min-width: 480px; }
    .ledger-table { min-width: 560px; }
    th, td { padding: 9px 10px; font-size: 12.5px; }
    .table-header { padding: 12px 14px; }
    .table-header h3 { font-size: 14px; }

    /* Modal — full screen sheet on mobile */
    .modal-overlay { padding: 0; align-items: flex-end; }
    .modal {
      border-radius: 16px 16px 0 0;
      max-width: 100%;
      max-height: 92vh;
      width: 100%;
    }
    .modal-lg { max-width: 100%; max-height: 92vh; }
    .modal-header { padding: 16px 18px 14px; }
    .modal-body { padding: 14px 18px; }
    .modal-footer { padding: 12px 18px; flex-wrap: wrap; gap: 8px; }
    .modal-footer .btn { flex: 1 1 auto; justify-content: center; min-width: 100px; }

    /* Forms */
    .form-row.cols-2 { grid-template-columns: 1fr; }
    .form-row.cols-3 { grid-template-columns: 1fr; }
    .form-row.cols-4 { grid-template-columns: 1fr 1fr; }
    .form-control { font-size: 16px; padding: 10px 12px; } /* 16px prevents iOS zoom */

    /* Items table in forms */
    .items-table { min-width: 520px; }
    .items-table input { font-size: 15px; padding: 6px 7px; }
    #saleItemsWrap, #purchItemsWrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* Section cards */
    .section-card { padding: 14px; margin-bottom: 14px; }
    .section-card h3 { font-size: 13px; margin-bottom: 10px; }

    /* Balance box wraps */
    .balance-box { flex-wrap: wrap; gap: 16px; padding: 14px 16px; }
    .balance-box .bb-item .val { font-size: 18px; }

    /* Report bar stacks */
    .report-month-bar { flex-wrap: wrap; gap: 8px; padding: 12px 14px; }
    .report-month-bar .form-control { width: 100%; }

    /* Action buttons tighter */
    .actions-col { flex-wrap: nowrap; gap: 4px; }
    .btn-xs { padding: 5px 8px; font-size: 11px; }

    /* Ledger */
    .ledger-table th, .ledger-table td { padding: 8px 10px; font-size: 12px; }

    /* Export buttons full width */
    .section-card .btn { width: 100%; justify-content: center; margin-bottom: 2px; }
  }

  @media (max-width: 400px) {
    .cards-grid { grid-template-columns: 1fr; }
    .form-row.cols-4 { grid-template-columns: 1fr; }
  }

  /* ── FULL PAGE ENTRY FORM ── */
  .entry-form-page {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .entry-form-header {
    padding: 18px 24px;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #f8fafc;
  }
  .entry-form-header h2 { font-size: 17px; font-weight: 700; color: var(--text); }
  .entry-form-body { padding: 24px; }
  .entry-form-footer {

<script>
// ═══════════════════════════════════════════════════════════
//  DATA LAYER
// ═══════════════════════════════════════════════════════════
const DB = {
  get(key) { try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; } },
  set(key, val) { localStorage.setItem(key, JSON.stringify(val)); },
  getObj(key, def={}) { try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; } },
  setObj(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
};

function getData(key) { return DB.get(key); }
function setData(key, val) { DB.set(key, val); }
function getSettings() { return DB.getObj('settings', { shopName: 'My Shop', address: '123 Main Street, City', phone: '9876543210' }); }
function saveSettings(s) { DB.setObj('settings', s); }

// ═══════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════
function fmt(n) { return '₹' + Number(n||0).toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtN(n) { return Number(n||0).toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function today() { return new Date().toISOString().split('T')[0]; }
function fmtDate(d) { if (!d) return '—'; const p = d.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function nextBillNo(prefix, key) {
  const all = getData(key);
  if (!all.length) return prefix + '001';
  const nums = all.map(x => parseInt((x.billNo||'').replace(/\D/g,''))||0);
  return prefix + String(Math.max(...nums)+1).padStart(3,'0');
}

function showToast(msg, type='success') {
  let t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:20px;right:20px;z-index:9999;padding:12px 20px;border-radius:8px;font-weight:600;font-size:13px;font-family:'DM Sans',sans-serif;box-shadow:0 4px 16px rgba(0,0,0,0.15);transition:all 0.3s;background:${type==='success'?'#2e7d32':type==='error'?'#c62828':'#f57f17'};color:#fff`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 2500);
}

function confirmAction(msg, cb) {
  if (confirm(msg)) cb();
}

// ═══════════════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════════════
function openModal(title, bodyHtml, footerHtml='', large=false) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalFooter').innerHTML = footerHtml || '<button class="btn btn-ghost" onclick="closeModal()">Close</button>';
  const box = document.getElementById('modalBox');
  box.className = 'modal' + (large?' modal-lg':'');
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
document.getElementById('modalOverlay').addEventListener('click', function(e){if(e.target===this)closeModal();});

// ═══════════════════════════════════════════════════════════
//  NAV
// ═══════════════════════════════════════════════════════════
function showPage(name) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const clicked = [...document.querySelectorAll('.nav-item')].find(el => el.getAttribute('onclick')?.includes("'"+name+"'"));
  if (clicked) clicked.classList.add('active');
  // Sync bottom nav
  document.querySelectorAll('.bn-item').forEach(el => el.classList.remove('active'));
  const bnMap = {dashboard:'bn-dashboard', sales:'bn-sales', purchases:'bn-purchases', inventory:'bn-inventory'};
  if (bnMap[name]) document.getElementById(bnMap[name])?.classList.add('active');
  closeSidebar();
  pages[name]();
}

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('show');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

// FAB: context-aware new entry button
function handleFab() {
  const page = document.getElementById('pageTitle').textContent;
  if (page === 'Sales Invoices') openSaleForm();
  else if (page === 'Purchases') openPurchaseForm();
  else if (page === 'Inventory') openItemForm();
  else if (page === 'Party Master') openPartyForm();
  else if (page === 'Returns') openReturnForm('credit');
  else showPage('sales'); // default: go to sales
}

const pageMeta = {
  dashboard:  { title: 'Dashboard', sub: 'Business overview' },
  sales:      { title: 'Sales', sub: 'Manage customer bills' },
  purchases:  { title: 'Purchases', sub: 'Manage purchase bills' },
  returns:    { title: 'Returns', sub: 'Credit & Debit notes' },
  inventory:  { title: 'Inventory', sub: 'Item master & stock' },
  parties:    { title: 'Party Master', sub: 'Customers & Vendors' },
  outstanding:{ title: 'Outstanding Dues', sub: 'Unpaid & partial invoices' },
  cashbook:   { title: 'Cash / Bank Register', sub: 'Record receipts & payments' },
  daybook:    { title: 'Day Book', sub: 'All transactions for a day' },
  pnl:        { title: 'Profit & Loss', sub: 'Income vs expense summary' },
  ledger:     { title: 'Party Ledger', sub: 'Account statement' },
  reports:    { title: 'Reports', sub: 'Monthly summary' },
  export:     { title: 'Export', sub: 'Download reports as Excel' },
  settings:   { title: 'Settings', sub: 'Shop configuration' }
};

function setMeta(name) {
  const m = pageMeta[name];
  document.getElementById('pageTitle').textContent = m.title;
  document.getElementById('pageSubtitle').textContent = m.sub;
  document.getElementById('topbarActions').innerHTML = '';
}

// ═══════════════════════════════════════════════════════════
//  PAGE: DASHBOARD
// ═══════════════════════════════════════════════════════════
const pages = {};

pages.dashboard = function() {
  setMeta('dashboard');
  const sales = getData('sales');
  const purchases = getData('purchases');
  const items = getData('items');
  const returns = getData('returns');

  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  const monthlySales = sales.filter(s=>s.date?.startsWith(thisMonth)).reduce((a,s)=>a+Number(s.total||0),0);
  const monthlyPurchases = purchases.filter(p=>p.date?.startsWith(thisMonth)).reduce((a,p)=>a+Number(p.total||0),0);
  const grossProfit = monthlySales - monthlyPurchases;

  const lowStock = items.filter(i => Number(i.stock||0) <= Number(i.minStock||0));
  const stockValueCost = items.reduce((a,i)=>a+Number(i.stock||0)*Number(i.purchaseRate||0),0);
  const pendingSales = sales.filter(s=>(s.status||'unpaid')!=='paid').length;
  const totalReceivable = sales.filter(s=>(s.status||'unpaid')!=='paid').reduce((a,s)=>a+(Number(s.total||0)-Number(s.paidAmount||0)),0);
  const pendingPurch = purchases.filter(p=>(p.status||'unpaid')!=='paid').length;
  const totalPayable = purchases.filter(p=>(p.status||'unpaid')!=='paid').reduce((a,p)=>a+(Number(p.total||0)-Number(p.paidAmount||0)),0);

  // Recent transactions (last 8)
  let txns = [
    ...sales.map(s=>({...s, type:'sale', party:s.customer})),
    ...purchases.map(p=>({...p, type:'purchase', party:p.vendor})),
    ...returns.map(r=>({...r, type:'return'}))
  ].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,8);

  const recentHtml = txns.length ? txns.map(t=>`
    <div class="txn-item">
      <div class="txn-dot ${t.type}"></div>
      <div class="txn-info">
        <div class="name">${t.party||t.partyName||'—'}</div>
        <div class="meta">${fmtDate(t.date)} · ${t.billNo||''} · <span class="badge badge-${t.type==='sale'?'info':t.type==='purchase'?'warning':'danger'}">${t.type.toUpperCase()}</span></div>
      </div>
      <div class="txn-amount">${fmt(t.total||t.amount)}</div>
    </div>`).join('') : '<p class="empty-state">No recent transactions</p>';

  const lowHtml = lowStock.length ? `<div class="alert alert-danger">⚠️ ${lowStock.length} item(s) are at or below minimum stock level.</div>`+
    lowStock.map(i=>`<div class="txn-item"><div class="txn-dot" style="background:#c62828"></div><div class="txn-info"><div class="name">${i.name}</div><div class="meta">Stock: <strong>${i.stock} ${i.unit}</strong> · Min: ${i.minStock}</div></div><span class="badge badge-danger">LOW</span></div>`).join('')
    : `<div class="alert alert-info">✓ All items are adequately stocked.</div>`;

  document.getElementById('pageContent').innerHTML = `
    <div class="cards-grid">
      <div class="stat-card accent">
        <div class="label">Sales This Month</div>
        <div class="value">${fmt(monthlySales)}</div>
        <div class="sub">${sales.filter(s=>s.date?.startsWith(thisMonth)).length} invoices</div>
      </div>
      <div class="stat-card">
        <div class="label">Purchases This Month</div>
        <div class="value">${fmt(monthlyPurchases)}</div>
        <div class="sub">${purchases.filter(p=>p.date?.startsWith(thisMonth)).length} bills</div>
      </div>
      <div class="stat-card ${grossProfit>=0?'success':'danger'}">
        <div class="label">Gross Profit (Month)</div>
        <div class="value">${fmt(grossProfit)}</div>
        <div class="sub">${grossProfit>=0?'Profit':'Loss'} this month</div>
      </div>
      <div class="stat-card">
        <div class="label">Stock Value (Cost)</div>
        <div class="value">${fmt(stockValueCost)}</div>
        <div class="sub">${items.length} items in inventory</div>
      </div>
      <div class="stat-card success" style="cursor:pointer" onclick="showPage('outstanding')">
        <div class="label">Receivable (Due)</div>
        <div class="value">${fmt(totalReceivable)}</div>
        <div class="sub">${pendingSales} unpaid invoices →</div>
      </div>
      <div class="stat-card danger" style="cursor:pointer" onclick="showPage('outstanding')">
        <div class="label">Payable (Due)</div>
        <div class="value">${fmt(totalPayable)}</div>
        <div class="sub">${pendingPurch} unpaid bills →</div>
      </div>
    </div>
    <div class="two-col">
      <div class="section-card">
        <h3>Recent Transactions</h3>
        ${recentHtml}
      </div>
      <div class="section-card">
        <h3>Low Stock Alerts</h3>
        ${lowHtml}
      </div>
    </div>
  `;
};

// ═══════════════════════════════════════════════════════════
//  PAGE: SALES
// ═══════════════════════════════════════════════════════════
pages.sales = function(searchVal='') {
  setMeta('sales');
  document.getElementById('topbarActions').innerHTML = `<button class="btn btn-primary" onclick="openSaleForm()">+ New Sale</button>`;
  document.getElementById('pageTitle').textContent = 'Sales';

  let sales = getData('sales');
  const q = searchVal.toLowerCase();
  if (q) sales = sales.filter(s => (s.customer||'').toLowerCase().includes(q) || (s.billNo||'').toLowerCase().includes(q));
  sales = [...sales].sort((a,b)=>b.date.localeCompare(a.date));

  const rows = sales.length ? sales.map(s=>`
    <tr>
      <td class="mono">${s.billNo}</td>
      <td>${fmtDate(s.date)}</td>
      <td>${s.customer||'—'}</td>
      <td class="mono">${fmt(s.total)}</td>
      <td><span class="badge ${s.status==='paid'?'badge-success':s.status==='partial'?'badge-warning':'badge-danger'}">${s.status||'unpaid'}</span></td>
      <td>
        <div class="actions-col">
          <button class="btn btn-outline btn-xs" onclick="viewSale('${s.id}')">View</button>
          <button class="btn btn-ghost btn-xs" onclick="openSaleForm('${s.id}')">Edit</button>
          <button class="btn btn-xs" style="background:#f3f4f6;color:#374151;border:1px solid #d1d5db" onclick="printSale('${s.id}')">Print</button>
          <button class="btn btn-danger btn-xs" onclick="deleteSale('${s.id}')">Del</button>
        </div>
      </td>
    </tr>`).join('') : `<tr><td colspan="6"><div class="empty-state"><p>No sales invoices yet. Create your first sale!</p></div></td></tr>`;

  document.getElementById('pageContent').innerHTML = `
    <div class="table-wrap">
      <div class="table-header">
        <h3>Sales</h3>
        <div class="search-wrap">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="form-control" style="width:220px" placeholder="Search customer, bill no..." value="${searchVal}" oninput="pages.sales(this.value)">
        </div>
      </div>
      <table>
        <thead><tr><th>Bill No</th><th>Date</th><th>Customer</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
};

function openSaleForm(editId=null) {
  const sale = editId ? getData('sales').find(s=>s.id===editId) : null;
  const items = getData('items');
  const parties = getData('parties').filter(p=>p.type==='customer'||p.type==='both');
  const billNo = sale ? sale.billNo : nextBillNo('INV-', 'sales');

  const custOptions = parties.map(p=>`<option value="${p.name}" ${sale?.customer===p.name?'selected':''}>${p.name}</option>`).join('');

  const itemRows = existingItems.map((it,idx)=>buildSaleItemRow(idx, it, itemOptions)).join('');

  // Set page title
  document.getElementById('pageTitle').textContent = sale ? 'Edit Sale' : 'New Sale';
  document.getElementById('pageSubtitle').textContent = sale ? 'Update invoice details' : 'Create sale invoice';

let _saleItemIdx = 10;
let _saleItemOptions = '';

function buildSaleItemRow(idx, it, itemOptions) {
  const discPct = it.discPct !== undefined ? it.discPct : 0;
  const discAmt = it.discAmt !== undefined ? it.discAmt : 0;
  return `<tr id="sir_${idx}">
    <td class="sno-cell" style="width:28px;color:#999;font-size:12px"></td>
    <td><input class="form-control" style="font-size:13px" list="itemList_s" value="${it.name||''}" onchange="fillSaleItemRate(this,${idx})" oninput="calcSaleTotal()">
      <datalist id="itemList_s">${itemOptions}</datalist></td>
    <td style="width:100px"><input class="form-control mono" id="sir_qty_${idx}" type="number" min="0" step="any" value="${it.qty||1}" oninput="calcSaleItemAmt(${idx})"></td>
    <td style="width:70px"><input class="form-control" id="sir_unit_${idx}" value="${it.unit||'Pcs'}"></td>
    <td style="width:100px"><input class="form-control mono" id="sir_rate_${idx}" type="number" min="0" step="any" value="${it.rate||0}" oninput="calcSaleItemAmt(${idx})"></td>
    <td style="width:80px"><input class="form-control mono" id="sir_discp_${idx}" type="number" min="0" max="100" step="any" value="${discPct}" placeholder="0" oninput="onSaleDiscPct(${idx})" style="text-align:center"></td>
    <td style="width:110px"><input class="form-control mono" id="sir_disca_${idx}" type="number" min="0" step="any" value="${discAmt}" placeholder="0.00" oninput="onSaleDiscAmt(${idx})"></td>
    <td style="width:115px"><input class="form-control mono" id="sir_amt_${idx}" value="${fmtN(it.amount||0)}" readonly style="background:#f8fafc;font-weight:600"></td>
    <td style="width:28px"><button style="border:none;background:none;color:#c62828;cursor:pointer;font-size:16px" onclick="document.getElementById('sir_${idx}').remove();calcSaleTotal();renumberRows('saleItemsBody')">✕</button></td>
  </tr>`;
}

function renumberRows(tbodyId) {
  const rows = document.querySelectorAll('#' + tbodyId + ' tr');
  rows.forEach((row, i) => {
    const cell = row.querySelector('.sno-cell');
    if (cell) cell.textContent = i + 1;
  });
}

function addSaleItemRow() {
  _saleItemIdx++;
  const tbody = document.getElementById('saleItemsBody');
  const temp = document.createElement('table');
  temp.innerHTML = '<tbody>' + buildSaleItemRow(_saleItemIdx, {name:'',qty:1,unit:'Pcs',rate:0,amount:0}, _saleItemOptions) + '</tbody>';
  tbody.appendChild(temp.querySelector('tr'));
  renumberRows('saleItemsBody');
}

function fillSaleItemRate(input, idx) {
  const items = getData('items');
  const item = items.find(i=>i.name===input.value);
  if (item) {
    document.getElementById('sir_rate_'+idx).value = item.saleRate||0;
    document.getElementById('sir_unit_'+idx).value = item.unit||'Pcs';
    calcSaleItemAmt(idx);
  }
}

function calcSaleItemAmt(idx) {
  const qty   = parseFloat(document.getElementById('sir_qty_'+idx)?.value||0);
  const rate  = parseFloat(document.getElementById('sir_rate_'+idx)?.value||0);
  const gross = qty * rate;
  const pct   = parseFloat(document.getElementById('sir_discp_'+idx)?.value||0);
  // If a disc% is set, always re-derive disc amount from it (so changing qty/rate auto-updates disc amt)
  let discA;
  if (pct > 0) {
    discA = parseFloat((gross * pct / 100).toFixed(2));
    const daEl = document.getElementById('sir_disca_'+idx);
    if (daEl) daEl.value = discA;
  } else {
    discA = parseFloat(document.getElementById('sir_disca_'+idx)?.value||0);
  }
  const amt = Math.max(0, gross - discA);
  const el = document.getElementById('sir_amt_'+idx);
  if (el) el.value = fmtN(amt);
  calcSaleTotal();
}

function onSaleDiscPct(idx) {
  const qty   = parseFloat(document.getElementById('sir_qty_'+idx)?.value||0);
  const rate  = parseFloat(document.getElementById('sir_rate_'+idx)?.value||0);
  const pct   = parseFloat(document.getElementById('sir_discp_'+idx)?.value||0);
  const gross = qty * rate;
  const discA = parseFloat((gross * pct / 100).toFixed(2));
  const daEl  = document.getElementById('sir_disca_'+idx);
  if (daEl) daEl.value = discA;
  calcSaleItemAmt(idx);
}

function onSaleDiscAmt(idx) {
  const qty   = parseFloat(document.getElementById('sir_qty_'+idx)?.value||0);
  const rate  = parseFloat(document.getElementById('sir_rate_'+idx)?.value||0);
  const discA = parseFloat(document.getElementById('sir_disca_'+idx)?.value||0);
  const gross = qty * rate;
  const pct   = gross > 0 ? parseFloat((discA / gross * 100).toFixed(2)) : 0;
  const dpEl  = document.getElementById('sir_discp_'+idx);
  if (dpEl) dpEl.value = pct;
  calcSaleItemAmt(idx);
}

function recalcAllSaleRows() {
  document.querySelectorAll('#saleItemsBody tr').forEach(row => {
    const idx = row.id?.replace('sir_','');
    if (idx) calcSaleItemAmt(idx);
  });
}

function calcSaleTotal() {
  const rows = document.querySelectorAll('#saleItemsBody tr');
  let total = 0;
  rows.forEach(row => {
    const id = row.id?.replace('sir_','');
    const qty   = parseFloat(document.getElementById('sir_qty_'+id)?.value||0);
    const rate  = parseFloat(document.getElementById('sir_rate_'+id)?.value||0);
    const discA = parseFloat(document.getElementById('sir_disca_'+id)?.value||0);
    total += Math.max(0, qty * rate - discA);
  });
  const el = document.getElementById('s_total');
  if (el) el.textContent = fmt(total);
  return total;
}

function getSaleItemsFromForm() {
  const rows = document.querySelectorAll('#saleItemsBody tr');
  const items = [];
  rows.forEach(row => {
    const id = row.id?.replace('sir_','');
    const nameEl = row.querySelector('input[list]');
    const name   = nameEl?.value||'';
    const qty    = parseFloat(document.getElementById('sir_qty_'+id)?.value||0);
    const unit   = document.getElementById('sir_unit_'+id)?.value||'Pcs';
    const rate   = parseFloat(document.getElementById('sir_rate_'+id)?.value||0);
    const discPct= parseFloat(document.getElementById('sir_discp_'+id)?.value||0);
    const discAmt= parseFloat(document.getElementById('sir_disca_'+id)?.value||0);
    const amount = Math.max(0, qty * rate - discAmt);
    if (name && qty > 0) items.push({ name, qty, unit, rate, discPct, discAmt, amount });
  });
  return items;
}

function saveSale(editId) {
  const billNo = document.getElementById('s_billNo').value;
  const date = document.getElementById('s_date').value;
  const customer = document.getElementById('s_customer').value.trim();
  const saleItems = getSaleItemsFromForm();

  if (!customer) return showToast('Customer name required', 'error');
  if (!saleItems.length) return showToast('Add at least one item', 'error');

  const total = saleItems.reduce((a,i)=>a+i.amount,0);
  const sales = getData('sales');

  if (editId) {
    // Atomic: load items once, reverse old, apply new, save once
    const old = sales.find(s=>s.id===editId);
    let stockItems = getData('items');
    if (old && old.items) {
      old.items.forEach(si => {
        const i = stockItems.findIndex(x=>x.name===si.name);
        if (i>=0) stockItems[i].stock = Number(stockItems[i].stock||0) + Number(si.qty||0);
      });
    }
    saleItems.forEach(si => {
      const i = stockItems.findIndex(x=>x.name===si.name);
      if (i>=0) stockItems[i].stock = Math.max(0, Number(stockItems[i].stock||0) - Number(si.qty||0));
    });
    setData('items', stockItems);
    const idx = sales.findIndex(s=>s.id===editId);
    sales[idx] = { ...sales[idx], billNo, date, customer, items: saleItems, total };
  } else {
    const newSale = { id: uid(), billNo, date, customer, items: saleItems, total, paidAmount:0, status:'unpaid' };
    sales.push(newSale);
    applyStockForSale(newSale);
  }

  setData('sales', sales);
  showToast('Sale invoice saved!');
  pages.sales();
}

function applyStockForSale(sale) {
  const items = getData('items');
  sale.items.forEach(si => {
    const idx = items.findIndex(i=>i.name===si.name);
    if (idx>=0) items[idx].stock = Math.max(0, Number(items[idx].stock||0) - Number(si.qty||0));
  });
  setData('items', items);
}

function reverseStockForSale(sale) {
  const items = getData('items');
  sale.items.forEach(si => {
    const idx = items.findIndex(i=>i.name===si.name);
    if (idx>=0) items[idx].stock = Number(items[idx].stock||0) + Number(si.qty||0);
  });
  setData('items', items);
}

function deleteSale(id) {
  confirmAction('Delete this sale invoice? Stock will be reversed.', () => {
    const sales = getData('sales');
    const sale = sales.find(s=>s.id===id);
    if (sale) reverseStockForSale(sale);
    setData('sales', sales.filter(s=>s.id!==id));
    showToast('Invoice deleted');
    pages.sales();
  });
}

let _currentViewId = null;
let _purchItemIdx = 10;
let _purchItemOptions = '';

function buildPurchaseItemRow(idx, it, itemOptions) {
  const saleRateVal = it.saleRate !== undefined ? it.saleRate : (it.rate ? Math.round(it.rate * 1.3) : 0);
  const discPct = it.discPct !== undefined ? it.discPct : 0;
  const discAmt = it.discAmt !== undefined ? it.discAmt : 0;
  return `<tr id="pir_${idx}">
    <td class="sno-cell" style="width:28px;color:#999;font-size:12px"></td>
    <td><input class="form-control" style="font-size:13px" list="itemList_p" value="${it.name||''}" onchange="fillPurchItemRate(this,${idx})" oninput="calcPurchTotal()">
      <datalist id="itemList_p">${itemOptions}</datalist></td>
    <td style="width:100px"><input class="form-control mono" id="pir_qty_${idx}" type="number" min="0" step="any" value="${it.qty||1}" oninput="calcPurchItemAmt(${idx})"></td>
    <td style="width:70px"><input class="form-control" id="pir_unit_${idx}" value="${it.unit||'Pcs'}"></td>
    <td style="width:100px"><input class="form-control mono" id="pir_rate_${idx}" type="number" min="0" step="any" value="${it.rate||0}" oninput="calcPurchItemAmt(${idx})"></td>
    <td style="width:80px"><input class="form-control mono" id="pir_discp_${idx}" type="number" min="0" max="100" step="any" value="${discPct}" placeholder="0" oninput="onPurchDiscPct(${idx})" style="text-align:center"></td>
    <td style="width:110px"><input class="form-control mono" id="pir_disca_${idx}" type="number" min="0" step="any" value="${discAmt}" placeholder="0.00" oninput="onPurchDiscAmt(${idx})"></td>
    <td style="width:100px"><input class="form-control mono" id="pir_srate_${idx}" type="number" min="0" step="any" value="${saleRateVal}" placeholder="Sale rate" title="Sale rate for inventory"></td>
    <td style="width:115px"><input class="form-control mono" id="pir_amt_${idx}" value="${fmtN(it.amount||0)}" readonly style="background:#f8fafc;font-weight:600"></td>
    <td style="width:28px"><button style="border:none;background:none;color:#c62828;cursor:pointer;font-size:16px" onclick="document.getElementById('pir_${idx}').remove();calcPurchTotal();renumberRows('purchItemsBody')">✕</button></td>
  </tr>`;
}

function addPurchItemRow() {
  _purchItemIdx++;
  const tbody = document.getElementById('purchItemsBody');
  const temp = document.createElement('table');
  temp.innerHTML = '<tbody>' + buildPurchaseItemRow(_purchItemIdx, {name:'',qty:1,unit:'Pcs',rate:0,amount:0}, _purchItemOptions) + '</tbody>';
  tbody.appendChild(temp.querySelector('tr'));
  renumberRows('purchItemsBody');
}

function fillPurchItemRate(input, idx) {
  const items = getData('items');
  const item = items.find(i=>i.name===input.value);
  if (item) {
    document.getElementById('pir_rate_'+idx).value = item.purchaseRate||0;
    document.getElementById('pir_srate_'+idx).value = item.saleRate||0;
    document.getElementById('pir_unit_'+idx).value = item.unit||'Pcs';
    calcPurchItemAmt(idx);
  }
  // if not in inventory, leave blank for user to fill
}

function calcPurchItemAmt(idx) {
  const qty   = parseFloat(document.getElementById('pir_qty_'+idx)?.value||0);
  const rate  = parseFloat(document.getElementById('pir_rate_'+idx)?.value||0);
  const gross = qty * rate;
  const pct   = parseFloat(document.getElementById('pir_discp_'+idx)?.value||0);
  // If a disc% is set, always re-derive disc amount from it (so changing qty/rate auto-updates disc amt)
  let discA;
  if (pct > 0) {
    discA = parseFloat((gross * pct / 100).toFixed(2));
    const daEl = document.getElementById('pir_disca_'+idx);
    if (daEl) daEl.value = discA;
  } else {
    discA = parseFloat(document.getElementById('pir_disca_'+idx)?.value||0);
  }
  const amt = Math.max(0, gross - discA);
  const el = document.getElementById('pir_amt_'+idx);
  if (el) el.value = fmtN(amt);
  calcPurchTotal();
}

function onPurchDiscPct(idx) {
  const qty   = parseFloat(document.getElementById('pir_qty_'+idx)?.value||0);
  const rate  = parseFloat(document.getElementById('pir_rate_'+idx)?.value||0);
  const pct   = parseFloat(document.getElementById('pir_discp_'+idx)?.value||0);
  const gross = qty * rate;
  const discA = parseFloat((gross * pct / 100).toFixed(2));
  const daEl  = document.getElementById('pir_disca_'+idx);
  if (daEl) daEl.value = discA;
  calcPurchItemAmt(idx);
}

function onPurchDiscAmt(idx) {
  const qty   = parseFloat(document.getElementById('pir_qty_'+idx)?.value||0);
  const rate  = parseFloat(document.getElementById('pir_rate_'+idx)?.value||0);
  const discA = parseFloat(document.getElementById('pir_disca_'+idx)?.value||0);
  const gross = qty * rate;
  const pct   = gross > 0 ? parseFloat((discA / gross * 100).toFixed(2)) : 0;
  const dpEl  = document.getElementById('pir_discp_'+idx);
  if (dpEl) dpEl.value = pct;
  calcPurchItemAmt(idx);
}

function recalcAllPurchRows() {
  document.querySelectorAll('#purchItemsBody tr').forEach(row => {
    const idx = row.id?.replace('pir_','');
    if (idx) calcPurchItemAmt(idx);
  });
}

function calcPurchTotal() {
  const rows = document.querySelectorAll('#purchItemsBody tr');
  let total = 0;
  rows.forEach(row => {
    const id    = row.id?.replace('pir_','');
    const qty   = parseFloat(document.getElementById('pir_qty_'+id)?.value||0);
    const rate  = parseFloat(document.getElementById('pir_rate_'+id)?.value||0);
    const discA = parseFloat(document.getElementById('pir_disca_'+id)?.value||0);
    total += Math.max(0, qty * rate - discA);
  });
  const el = document.getElementById('p_total');
  if (el) el.textContent = fmt(total);
}

function getPurchItemsFromForm() {
  const rows = document.querySelectorAll('#purchItemsBody tr');
  const items = [];
  rows.forEach(row => {
    const id      = row.id?.replace('pir_','');
    const nameEl  = row.querySelector('input[list]');
    const name    = nameEl?.value||'';
    const qty     = parseFloat(document.getElementById('pir_qty_'+id)?.value||0);
    const unit    = document.getElementById('pir_unit_'+id)?.value||'Pcs';
    const rate    = parseFloat(document.getElementById('pir_rate_'+id)?.value||0);
    const discPct = parseFloat(document.getElementById('pir_discp_'+id)?.value||0);
    const discAmt = parseFloat(document.getElementById('pir_disca_'+id)?.value||0);
    const saleRate= parseFloat(document.getElementById('pir_srate_'+id)?.value||0);
    const amount  = Math.max(0, qty * rate - discAmt);
    if (name && qty > 0) items.push({ name, qty, unit, rate, discPct, discAmt, saleRate, amount });
  });
  return items;
}

function savePurchase(editId='') {
  const billNo = document.getElementById('p_billNo').value;
  const date   = document.getElementById('p_date').value;
  const vendor = document.getElementById('p_vendor').value.trim();
  const purchItems = getPurchItemsFromForm();

  if (!vendor) return showToast('Supplier name required', 'error');
  if (!purchItems.length) return showToast('Add at least one item', 'error');

  const total     = purchItems.reduce((a,i)=>a+i.amount, 0);
  const purchases = getData('purchases');
  let   invItems  = getData('items');   // single in-memory copy for all ops

  if (editId) {
    // ── Step 1: Reverse old purchase stock ──────────────────
    const oldPurch = purchases.find(x=>x.id===editId);
    if (oldPurch && oldPurch.items) {
      oldPurch.items.forEach(pi => {
        const i = invItems.findIndex(x=>x.name===pi.name);
        if (i>=0) invItems[i].stock = Math.max(0, Number(invItems[i].stock||0) - Number(pi.qty||0));
      });
    }
    // ── Step 2: Update the purchase record ──────────────────
    const pidx = purchases.findIndex(x=>x.id===editId);
    purchases[pidx] = { ...purchases[pidx], billNo, date, vendor, items: purchItems, total };
  } else {
    // ── New purchase record ──────────────────────────────────
    purchases.push({ id: uid(), billNo, date, vendor, items: purchItems, total, paidAmount:0, status:'unpaid' });
  }

  // ── Step 3: Apply new purchase items to inventory ─────────
  let newItemsAdded = 0;
  purchItems.forEach(pi => {
    const qty  = Number(pi.qty||0);
    const rate = Number(pi.rate||0);
    const i    = invItems.findIndex(x=>x.name===pi.name);
    if (i >= 0) {
      // Existing item — add new qty, update rates
      invItems[i].stock        = Number(invItems[i].stock||0) + qty;
      invItems[i].purchaseRate = rate;
      if (Number(pi.saleRate||0) > 0) invItems[i].saleRate = Number(pi.saleRate);
      invItems[i].unit         = pi.unit || invItems[i].unit;
    } else {
      // New item — auto-create in inventory
      // openingStock = 0 (item didn't exist before this purchase)
      // stock = qty purchased (running total starts from 0 + this purchase)
      invItems.push({
        id: uid(), name: pi.name, unit: pi.unit||'Pcs',
        openingStock: 0, stock: qty, purchaseRate: rate,
        saleRate: Number(pi.saleRate||0), minStock: 5
      });
      newItemsAdded++;
    }
  });

  setData('purchases', purchases);
  setData('items', invItems);
  const msg = newItemsAdded > 0
    ? `Purchase saved! ${newItemsAdded} new item(s) added to inventory.`
    : 'Purchase saved & stock updated!';
  showToast(msg);
  pages.purchases();
}

  openModal('Purchase: '+p.billNo, `

        <tbody>${p.items.map((it,i)=>`<tr>${[i+1,it.name,it.qty,it.unit,fmtN(it.rate),it.discAmt>0?it.discPct+'% (₹'+fmtN(it.discAmt)+')':'—',fmtN(it.amount)].map(v=>`<td style="padding:7px 10px;border:1px solid #e5e7eb">${v}</td>`).join('')}</tr>`).join('')}</tbody>
        <tfoot><tr><td colspan="6" style="padding:8px 10px;border:1px solid #e5e7eb;text-align:right;font-weight:700">Total</td><td style="padding:8px 10px;border:1px solid #e5e7eb;font-weight:700">₹${fmtN(p.total)}</td></tr></tfoot>

  `, `<button class="btn btn-ghost" onclick="closeModal()">Close</button><button class="btn btn-outline" onclick="closeModal();openPurchaseForm(_currentViewId)">Edit</button>`);

function deletePurchase(id) {
  confirmAction('Delete this purchase? Stock added from this purchase will be reversed.', () => {
    const purchases = getData('purchases');
    const p = purchases.find(x=>x.id===id);
    if (p) {
      const items = getData('items');
      p.items.forEach(pi => {
        const idx = items.findIndex(i=>i.name===pi.name);
        if (idx>=0) items[idx].stock = Math.max(0, Number(items[idx].stock||0) - Number(pi.qty||0));
      });
      setData('items', items);
    }
    setData('purchases', purchases.filter(x=>x.id!==id));
    showToast('Purchase deleted');
    pages.purchases();
  });
}

function showItemHistory(itemName) {
  const item      = getData('items').find(i=>i.name===itemName);
  const sales     = getData('sales');
  const purchases = getData('purchases');
  const returns   = getData('returns');

  if (!item) return showToast('Item not found', 'error');

  // ── Collect all movements for this item ──────────────────
  const movements = [];

  // From purchases
  purchases.forEach(p => {
    (p.items||[]).forEach(pi => {
      if (pi.name === itemName) {
        movements.push({
          date:    p.date,
          type:    'purchase',
          billNo:  p.billNo,
          party:   p.vendor,
          qtyIn:   Number(pi.qty||0),
          qtyOut:  0,
          rate:    pi.rate,
          discPct: pi.discPct||0,
          discAmt: pi.discAmt||0,
          amount:  pi.amount||0
        });
      }
    });
  });

  // From sales
  sales.forEach(s => {
    (s.items||[]).forEach(si => {
      if (si.name === itemName) {
        movements.push({
          date:    s.date,
          type:    'sale',
          billNo:  s.billNo,
          party:   s.customer,
          qtyIn:   0,
          qtyOut:  Number(si.qty||0),
          rate:    si.rate,
          discPct: si.discPct||0,
          discAmt: si.discAmt||0,
          amount:  si.amount||0
        });
      }
    });
  });

  // From returns (credit note = sales return = stock comes back IN)
  //             (debit note  = purchase return = stock goes OUT)
  returns.forEach(r => {
    // Returns don't have item-level detail — they are bill-level
    // We can only show them if they reference a bill that contains this item
    const refBill = r.type === 'credit'
      ? sales.find(s => s.billNo === r.originalBillNo)
      : purchases.find(p => p.billNo === r.originalBillNo);

    if (refBill) {
      const hasItem = (refBill.items||[]).some(it => it.name === itemName);
      if (hasItem) {
        movements.push({
          date:    r.date,
          type:    r.type === 'credit' ? 'sales-return' : 'purchase-return',
          billNo:  r.noteNo || '—',
          party:   r.partyName,
          qtyIn:   r.type === 'debit'  ? 0 : 0,   // qty not stored per-item in returns
          qtyOut:  r.type === 'credit' ? 0 : 0,
          rate:    0,
          discPct: 0, discAmt: 0,
          amount:  r.amount||0,
          isReturn: true,
          returnNote: r.type === 'credit' ? 'Sales Return (Credit Note)' : 'Purchase Return (Debit Note)'
        });
      }
    }
  });

  // ── Sort chronologically ──────────────────────────────────
  movements.sort((a,b) => a.date.localeCompare(b.date));

  // ── Opening stock ─────────────────────────────────────────
  const totalPurchased = movements.filter(m=>m.type==='purchase').reduce((a,m)=>a+m.qtyIn,0);
  const totalSold      = movements.filter(m=>m.type==='sale').reduce((a,m)=>a+m.qtyOut,0);
  const currentStock   = Number(item.stock||0);
  // Use stored openingStock if available (accurate), else reconstruct
  const openingStock   = item.openingStock !== undefined
    ? Number(item.openingStock)
    : currentStock - totalPurchased + totalSold;

  // ── Build running balance rows ────────────────────────────
  let balance = openingStock;
  let totalPurchaseValue = 0;
  let totalSaleValue = 0;

  const movRows = movements.map((m, idx) => {
    let qIn = m.qtyIn, qOut = m.qtyOut;
    if (!m.isReturn) {
      balance += qIn - qOut;
      if (m.type === 'purchase') totalPurchaseValue += m.amount;
      if (m.type === 'sale')     totalSaleValue     += m.amount;
    }

    const typeMeta = {
      'purchase':        { label:'Purchase',        cls:'badge-warning',  icon:'📦' },
      'sale':            { label:'Sale',             cls:'badge-info',     icon:'🧾' },
      'sales-return':    { label:'Sales Return',     cls:'badge-danger',   icon:'↩' },
      'purchase-return': { label:'Purchase Return',  cls:'badge-muted',    icon:'↪' },
    }[m.type] || { label: m.type, cls:'badge-muted', icon:'•' };

    const discStr = m.discPct > 0 ? `${m.discPct}%` : (m.discAmt > 0 ? `₹${fmtN(m.discAmt)}` : '—');

    return `<tr style="background:${idx%2===0?'#fff':'#fafcff'}">
      <td style="font-size:12.5px">${fmtDate(m.date)}</td>

function exportItemHistory(itemName) {
  const item      = getData('items').find(i=>i.name===itemName);
  const sales     = getData('sales');
  const purchases = getData('purchases');

  const movements = [];

  purchases.forEach(p => {
    (p.items||[]).forEach(pi => {
      if (pi.name===itemName) movements.push({ date:p.date, type:'Purchase', billNo:p.billNo, party:p.vendor, qtyIn:Number(pi.qty||0), qtyOut:0, rate:pi.rate, discPct:pi.discPct||0, discAmt:pi.discAmt||0, amount:pi.amount||0 });
    });
  });
  sales.forEach(s => {
    (s.items||[]).forEach(si => {
      if (si.name===itemName) movements.push({ date:s.date, type:'Sale', billNo:s.billNo, party:s.customer, qtyIn:0, qtyOut:Number(si.qty||0), rate:si.rate, discPct:si.discPct||0, discAmt:si.discAmt||0, amount:si.amount||0 });
    });
  });
  movements.sort((a,b)=>a.date.localeCompare(b.date));

  const totalPurchased = movements.filter(m=>m.type==='Purchase').reduce((a,m)=>a+m.qtyIn,0);
  const totalSold      = movements.filter(m=>m.type==='Sale').reduce((a,m)=>a+m.qtyOut,0);
  const openingStock   = item?.openingStock !== undefined
    ? Number(item.openingStock)
    : Number(item?.stock||0) - totalPurchased + totalSold;

  let balance = openingStock;
  const rows = [['Date','Type','Bill No','Party','Rate','Disc%','Disc Amt','Qty In','Qty Out','Balance','Amount']];
  rows.push([`Opening Balance`,'','','','','','','','',openingStock,'']);
  movements.forEach(m => {
    balance += m.qtyIn - m.qtyOut;
    rows.push([m.date, m.type, m.billNo, m.party, m.rate, m.discPct||0, m.discAmt||0, m.qtyIn||'', m.qtyOut||'', balance, m.amount]);
  });
  rows.push(['Closing Balance','','','','','','',totalPurchased, totalSold, balance,'']);

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb, ws, itemName.slice(0,31));
  XLSX.writeFile(wb, `Stock_History_${itemName.replace(/[^a-z0-9]/gi,'_')}.xlsx`);
  showToast('History exported!');
}

function saveItem(editId) {
  const name = document.getElementById('i_name').value.trim();
  if (!name) return showToast('Item name required', 'error');
  const openingStockVal = parseFloat(document.getElementById('i_stock').value||0);
  const itemData = {
    name,
    unit: document.getElementById('i_unit').value,
    purchaseRate: parseFloat(document.getElementById('i_purchaseRate').value||0),
    saleRate: parseFloat(document.getElementById('i_saleRate').value||0),
    minStock: parseFloat(document.getElementById('i_minStock').value||5),
  };

  const items = getData('items');
  if (editId) {
    const idx = items.findIndex(i=>i.id===editId);
    // On edit: recalculate stock = new openingStock + all transactions
    const sales     = getData('sales');
    const purchases = getData('purchases');
    let totalPurchased = 0, totalSold = 0;
    purchases.forEach(p => (p.items||[]).forEach(pi => {
      if (pi.name === items[idx].name) totalPurchased += Number(pi.qty||0);
    }));
    sales.forEach(s => (s.items||[]).forEach(si => {
      if (si.name === items[idx].name) totalSold += Number(si.qty||0);
    }));
    const newStock = openingStockVal + totalPurchased - totalSold;
    items[idx] = { ...items[idx], ...itemData, openingStock: openingStockVal, stock: newStock };
  } else {
    // New item: openingStock = stock = whatever user entered
    if (items.find(i=>i.name.toLowerCase()===name.toLowerCase())) return showToast('Item with this name already exists', 'error');
    items.push({ id: uid(), ...itemData, openingStock: openingStockVal, stock: openingStockVal });
  }
  setData('items', items);
  closeModal();
  showToast('Item saved!');
  pages.inventory();
}

function deleteItem(id) {
  confirmAction('Delete this item from inventory?', () => {
    setData('items', getData('items').filter(i=>i.id!==id));
    showToast('Item deleted');
    pages.inventory();
  });
}

function preSelectLedgerParty(name) {
  const sel = document.getElementById('l_party');
  if (sel) sel.value = name;
}

function generateLedger() {
  const partyName = document.getElementById('l_party').value;
  const fromDate = document.getElementById('l_from').value;
  const toDate = document.getElementById('l_to').value;

  if (!partyName) return showToast('Select a party', 'error');

  const sales = getData('sales').filter(s=>s.customer===partyName&&s.date>=fromDate&&s.date<=toDate).map(s=>({...s,txnType:'sale',dr:s.total,cr:0}));
  const purchases = getData('purchases').filter(p=>p.vendor===partyName&&p.date>=fromDate&&p.date<=toDate).map(p=>({...p,txnType:'purchase',dr:0,cr:p.total}));
  const returns = getData('returns').filter(r=>r.partyName===partyName&&r.date>=fromDate&&r.date<=toDate).map(r=>({...r,txnType:r.type==='credit'?'credit-note':'debit-note', dr:r.type==='debit'?r.amount:0, cr:r.type==='credit'?r.amount:0, total:r.amount}));

  const txns = [...sales, ...purchases, ...returns].sort((a,b)=>a.date.localeCompare(b.date));

  let balance = 0;
  let totalDr = 0, totalCr = 0;
  const rows = txns.map(t => {
    balance += (t.dr||0) - (t.cr||0);
    totalDr += t.dr||0;
    totalCr += t.cr||0;
    const type = t.txnType;
    const typeLabel = type==='sale'?'Sale':type==='purchase'?'Purchase':type==='credit-note'?'Credit Note':'Debit Note';
    const billNo = t.billNo||t.noteNo||'—';
    return `<tr>
      <td>${fmtDate(t.date)}</td>
      <td><span class="badge badge-${type==='sale'?'info':type==='purchase'?'warning':'muted'}">${typeLabel}</span></td>
      <td class="mono">${billNo}</td>
      <td class="mono ${t.dr>0?'dr':''}">${t.dr>0?fmt(t.dr):'—'}</td>
      <td class="mono ${t.cr>0?'cr':''}">${t.cr>0?fmt(t.cr):'—'}</td>
      <td class="mono" style="font-weight:600">${balance>=0?fmt(balance)+' Dr':fmt(Math.abs(balance))+' Cr'}</td>
    </tr>`;
  });

  const closingLabel = balance >= 0 ? `${fmt(balance)} Dr` : `${fmt(Math.abs(balance))} Cr`;

  document.getElementById('ledgerResult').innerHTML = `
    <div class="balance-box">
      <div class="bb-item"><div class="lbl">Party</div><div class="val" style="font-size:18px">${partyName}</div></div>
      <div class="bb-item"><div class="lbl">Period</div><div class="val" style="font-size:15px">${fmtDate(fromDate)} – ${fmtDate(toDate)}</div></div>
      <div class="bb-item"><div class="lbl">Closing Balance</div><div class="val">${closingLabel}</div></div>
      <div style="margin-left:auto">
        <button class="btn btn-outline" style="border-color:rgba(255,255,255,0.4);color:#fff" onclick="exportLedgerXLSX('${partyName}','${fromDate}','${toDate}')">⬇ Export Excel</button>
      </div>
    </div>

function exportLedgerXLSX(partyName, fromDate, toDate) {
  const sales = getData('sales').filter(s=>s.customer===partyName&&s.date>=fromDate&&s.date<=toDate);
  const purchases = getData('purchases').filter(p=>p.vendor===partyName&&p.date>=fromDate&&p.date<=toDate);
  const returns = getData('returns').filter(r=>r.partyName===partyName&&r.date>=fromDate&&r.date<=toDate);
  const txns = [
    ...sales.map(s=>({date:s.date,type:'Sale',billNo:s.billNo,dr:s.total,cr:0})),
    ...purchases.map(p=>({date:p.date,type:'Purchase',billNo:p.billNo,dr:0,cr:p.total})),
    ...returns.map(r=>({date:r.date,type:r.type==='credit'?'Credit Note':'Debit Note',billNo:r.noteNo||'—',dr:r.type==='debit'?r.amount:0,cr:r.type==='credit'?r.amount:0}))
  ].sort((a,b)=>a.date.localeCompare(b.date));

  let bal = 0;
  const wsData = [['Date','Type','Bill No','Debit (Dr)','Credit (Cr)','Balance']];
  txns.forEach(t=>{
    bal += (t.dr||0)-(t.cr||0);
    wsData.push([t.date,t.type,t.billNo,t.dr||'',t.cr||',', bal>=0?bal+' Dr':Math.abs(bal)+' Cr']);
  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  XLSX.utils.book_append_sheet(wb, ws, partyName.slice(0,31));
  XLSX.writeFile(wb, `Ledger_${partyName}_${fromDate}_${toDate}.xlsx`);
  showToast('Ledger exported!');
}

function generateReport() {
  const month = document.getElementById('r_month')?.value;
  if (!month) return;

  const sales = getData('sales').filter(s=>s.date?.startsWith(month));
  const purchases = getData('purchases').filter(p=>p.date?.startsWith(month));
  const items = getData('items');

  const totalSales = sales.reduce((a,s)=>a+Number(s.total||0),0);
  const totalPurchases = purchases.reduce((a,p)=>a+Number(p.total||0),0);
  const grossProfit = totalSales - totalPurchases;

  const stockCost = items.reduce((a,i)=>a+Number(i.stock||0)*Number(i.purchaseRate||0),0);
  const stockMRP = items.reduce((a,i)=>a+Number(i.stock||0)*Number(i.saleRate||0),0);

  const salesRows = sales.length ? sales.sort((a,b)=>b.date.localeCompare(a.date)).map(s=>`
    <tr>
      <td class="mono">${s.billNo}</td>
      <td>${fmtDate(s.date)}</td>
      <td>${s.customer||'—'}</td>
      <td>${s.items?.length||0}</td>
      <td class="mono">${fmt(s.total)}</td>
    </tr>`).join('') : `<tr><td colspan="5"><div class="empty-state"><p>No sales this month.</p></div></td></tr>`;

  document.getElementById('reportResult').innerHTML = `
    <div class="cards-grid" style="margin-bottom:20px">
      <div class="stat-card accent"><div class="label">Total Sales</div><div class="value">${fmt(totalSales)}</div><div class="sub">${sales.length} invoices</div></div>
      <div class="stat-card"><div class="label">Total Purchases</div><div class="value">${fmt(totalPurchases)}</div><div class="sub">${purchases.length} bills</div></div>
      <div class="stat-card ${grossProfit>=0?'success':'danger'}"><div class="label">Gross Profit</div><div class="value">${fmt(grossProfit)}</div></div>
      <div class="stat-card"><div class="label">Stock Value (Cost)</div><div class="value">${fmt(stockCost)}</div><div class="sub">MRP: ${fmt(stockMRP)}</div></div>
    </div>
    <div class="table-wrap">
      <div class="table-header"><h3>Sales Transactions — ${month}</h3></div>
      <table>
        <thead><tr><th>Bill No</th><th>Date</th><th>Customer</th><th>Items</th><th>Amount</th></tr></thead>
        <tbody>${salesRows}</tbody>
      </table>
    </div>
  `;
}

function getMonthRange() {
  const from = document.getElementById('ex_month')?.value || '';
  const to = document.getElementById('ex_toMonth')?.value || '';
  return { from, to };
}

function inRange(date, from, to) {
  if (!from && !to) return true;
  const m = date?.slice(0,7)||'';
  if (from && m < from) return false;
  if (to && m > to) return false;
  return true;
}

function exportSalesRegister() {
  const { from, to } = getMonthRange();
  const sales = getData('sales').filter(s=>inRange(s.date,from,to)).sort((a,b)=>a.date.localeCompare(b.date));
  const rows = [['Bill No','Date','Customer','Items','Amount']];
  sales.forEach(s=>rows.push([s.billNo,s.date,s.customer,s.items?.length||0,s.total]));
  rows.push(['','','','TOTAL',sales.reduce((a,s)=>a+s.total,0)]);
  downloadSheet(rows, 'Sales Register', `Sales_Register_${from||'all'}.xlsx`);
}

function exportPurchaseRegister() {
  const { from, to } = getMonthRange();
  const purch = getData('purchases').filter(p=>inRange(p.date,from,to)).sort((a,b)=>a.date.localeCompare(b.date));
  const rows = [['Bill No','Date','Supplier','Items','Amount']];
  purch.forEach(p=>rows.push([p.billNo,p.date,p.vendor,p.items?.length||0,p.total]));
  rows.push(['','','','TOTAL',purch.reduce((a,p)=>a+p.total,0)]);
  downloadSheet(rows, 'Purchase Register', `Purchase_Register_${from||'all'}.xlsx`);
}

function exportProfitSummary() {
  const sales = getData('sales');
  const purchases = getData('purchases');
  const months = [...new Set([...sales.map(s=>s.date?.slice(0,7)), ...purchases.map(p=>p.date?.slice(0,7))].filter(Boolean))].sort();
  const rows = [['Month','Total Sales','Total Purchases','Gross Profit']];
  months.forEach(m=>{
    const ms = sales.filter(s=>s.date?.startsWith(m)).reduce((a,s)=>a+s.total,0);
    const mp = purchases.filter(p=>p.date?.startsWith(m)).reduce((a,p)=>a+p.total,0);
    rows.push([m, ms, mp, ms-mp]);
  });
  downloadSheet(rows, 'Profit Summary', 'Profit_Summary.xlsx');
}

function exportStockReport() {
  const items = getData('items');
  const rows = [['Item Name','Unit','Purchase Rate','Sale Rate','Current Stock','Stock Value (Cost)','Stock Value (MRP)','Min Stock','Status']];
  items.forEach(i=>{
    const cost = Number(i.stock||0)*Number(i.purchaseRate||0);

function saveSettingsForm() {

  };

function exportBackup() {
  const data = {
    settings: getSettings(),
    items: getData('items'),
    parties: getData('parties'),
    sales: getData('sales'),
    purchases: getData('purchases'),
    returns: getData('returns'),
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `TradeBook_Backup_${today()}.json`;
  a.click();
  showToast('Backup exported!');
}

function importBackup(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (confirm('This will replace ALL existing data. Are you sure?')) {
        if (data.settings) saveSettings(data.settings);
        if (data.items) setData('items', data.items);
        if (data.parties) setData('parties', data.parties);
        if (data.sales) setData('sales', data.sales);
        if (data.purchases) setData('purchases', data.purchases);
        if (data.returns) setData('returns', data.returns);
        showToast('Backup restored!');
        pages.settings();
      }
    } catch {
      showToast('Invalid backup file', 'error');
    }
  };
  reader.readAsText(file);
}

function clearAllData() {
  if (prompt('Type DELETE to confirm clearing all data:') === 'DELETE') {
    ['items','parties','sales','purchases','returns'].forEach(k=>localStorage.removeItem(k));
    showToast('All data cleared', 'error');
    pages.dashboard();
  }
}
