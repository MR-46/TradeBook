pages.outstanding = function(tab) {
  setMeta('outstanding');
  tab = tab || 'receivable';

  const sales = getData('sales');
  const purchases = getData('purchases');

  // Receivable = customers who owe us (unpaid/partial sales)
  const receivable = sales.filter(s => (s.status||'unpaid') !== 'paid')
    .map(s => ({
      ...s,
      party: s.customer,
      type: 'sale',
      due: Number(s.total||0) - Number(s.paidAmount||0)
    })).filter(x => x.due > 0)
    .sort((a,b) => a.date.localeCompare(b.date));

  // Payable = vendors we owe (unpaid/partial purchases)
  const payable = purchases.filter(p => (p.status||'unpaid') !== 'paid')
    .map(p => ({
      ...p,
      party: p.vendor,
      type: 'purchase',
      due: Number(p.total||0) - Number(p.paidAmount||0)
    })).filter(x => x.due > 0)
    .sort((a,b) => a.date.localeCompare(b.date));

  const totalRec = receivable.reduce((a,x)=>a+x.due,0);
  const totalPay = payable.reduce((a,x)=>a+x.due,0);

  function buildRows(list, type) {
    if (!list.length) return `<tr><td colspan="7"><div class="empty-state"><p>No outstanding ${type === 'sale' ? 'receivables' : 'payables'}. All clear! ✓</p></div></td></tr>`;
    return list.map(r => {
      const paid = Number(r.paidAmount||0);
      const pct = r.total > 0 ? Math.round(paid/r.total*100) : 0;
      const statusBadge = paid === 0
        ? `<span class="badge badge-danger">Unpaid</span>`
        : `<span class="badge badge-warning">Partial (${pct}%)</span>`;
      return `<tr>
        <td>${fmtDate(r.date)}</td>
        <td class="mono">${r.billNo}</td>
        <td><strong>${r.party}</strong></td>
        <td class="mono">${fmt(r.total)}</td>
        <td class="mono" style="color:var(--success)">${fmt(paid)}</td>
        <td class="mono" style="color:var(--danger);font-weight:700">${fmt(r.due)}</td>
        <td>${statusBadge}</td>
        <td>
          <button class="btn btn-success btn-xs" onclick="recordPayment('${r.id}','${type}')">Receive</button>
        </td>
      </tr>`;
    }).join('');
  }

  document.getElementById('topbarActions').innerHTML = `
    <button class="btn btn-outline btn-sm" onclick="exportOutstanding()">⬇ Export</button>
  `;

  document.getElementById('pageContent').innerHTML = `
    <div class="cards-grid" style="grid-template-columns:1fr 1fr;margin-bottom:20px">
      <div class="stat-card success">
        <div class="label">Total Receivable</div>
        <div class="value">${fmt(totalRec)}</div>
        <div class="sub">${receivable.length} invoices pending</div>
      </div>
      <div class="stat-card danger">
        <div class="label">Total Payable</div>
        <div class="value">${fmt(totalPay)}</div>
        <div class="sub">${payable.length} bills pending</div>
      </div>
    </div>

    <div style="display:flex;gap:0;margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;width:fit-content">
      <button class="btn ${tab==='receivable'?'btn-primary':'btn-ghost'}" style="border-radius:0;border:none" onclick="pages.outstanding('receivable')">
        💰 Receivable (${receivable.length})
      </button>
      <button class="btn ${tab==='payable'?'btn-primary':'btn-ghost'}" style="border-radius:0;border:none;border-left:1px solid var(--border)" onclick="pages.outstanding('payable')">
        📤 Payable (${payable.length})
      </button>
    </div>

    <div class="table-wrap">
      <div class="table-header">
        <h3>${tab==='receivable' ? '🟢 Sales Receivable — Customers who owe you' : '🔴 Purchase Payable — You owe suppliers'}</h3>
      </div>
      <table>
        <thead><tr><th>Date</th><th>Bill No</th><th>Party</th><th>Bill Amt</th><th>Paid</th><th>Due</th><th>Status</th><th>Action</th></tr></thead>
        <tbody>${buildRows(tab==='receivable'?receivable:payable, tab==='receivable'?'sale':'purchase')}</tbody>
        ${(tab==='receivable'?receivable:payable).length > 0 ? `
        <tfoot>
          <tr class="total-row">
            <td colspan="3">Total</td>
            <td class="mono">${fmt((tab==='receivable'?receivable:payable).reduce((a,x)=>a+x.total,0))}</td>
            <td class="mono" style="color:var(--success)">${fmt((tab==='receivable'?receivable:payable).reduce((a,x)=>a+Number(x.paidAmount||0),0))}</td>
            <td class="mono" style="color:var(--danger);font-weight:700">${fmt(tab==='receivable'?totalRec:totalPay)}</td>
            <td colspan="2"></td>
          </tr>
        </tfoot>` : ''}
      </table>
    </div>
  `;
};

function recordPayment(id, type) {
  const list = getData(type === 'sale' ? 'sales' : 'purchases');
  const rec = list.find(x => x.id === id);
  if (!rec) return;
  const due = Number(rec.total||0) - Number(rec.paidAmount||0);
  const partyLabel = type === 'sale' ? rec.customer : rec.vendor;

  openModal('Record Payment — ' + rec.billNo, `
    <div style="background:var(--bg);border-radius:8px;padding:14px;margin-bottom:16px;font-size:13px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="color:var(--text-muted)">Party</span><strong>${partyLabel}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="color:var(--text-muted)">Bill Amount</span><span class="mono">${fmt(rec.total)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="color:var(--text-muted)">Already Paid</span><span class="mono" style="color:var(--success)">${fmt(rec.paidAmount||0)}</span>
      </div>
      <div style="display:flex;justify-content:space-between">
        <span style="color:var(--text-muted)">Balance Due</span><span class="mono" style="color:var(--danger);font-weight:700">${fmt(due)}</span>
      </div>
    </div>
    <div class="form-row cols-2">
      <div class="form-group">
        <label class="form-label">Payment Date</label>
        <input class="form-control" type="date" id="pay_date" value="${today()}">
      </div>
      <div class="form-group">
        <label class="form-label">Amount Received (₹)</label>
        <input class="form-control mono" id="pay_amount" type="number" min="0" step="any" value="${due}" placeholder="${fmtN(due)}">
      </div>
    </div>
    <div class="form-row cols-2">
      <div class="form-group">
        <label class="form-label">Mode</label>
        <select class="form-control" id="pay_mode">
          <option>Cash</option><option>Bank Transfer</option><option>UPI</option><option>Cheque</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Reference / Note</label>
        <input class="form-control" id="pay_note" placeholder="UTR, cheque no., etc.">
      </div>
    </div>
  `, `
    <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button class="btn btn-success" onclick="savePayment('${id}','${type}',${due})">Save Payment</button>
  `);
}

function savePayment(id, type, maxDue) {
  const amount = parseFloat(document.getElementById('pay_amount').value||0);
  if (!amount || amount <= 0) return showToast('Enter a valid amount', 'error');
  if (amount > maxDue + 0.01) return showToast('Amount exceeds balance due', 'error');

  const date = document.getElementById('pay_date').value;
  const mode = document.getElementById('pay_mode').value;
  const note = document.getElementById('pay_note').value.trim();

  const key = type === 'sale' ? 'sales' : 'purchases';
  const list = getData(key);
  const idx = list.findIndex(x => x.id === id);
  if (idx < 0) return;

  list[idx].paidAmount = Number(list[idx].paidAmount||0) + amount;
  list[idx].status = list[idx].paidAmount >= list[idx].total - 0.01 ? 'paid' : 'partial';

  // Record in cashbook
  const cashEntries = getData('cashbook');
  cashEntries.push({
    id: uid(), date, type: type==='sale' ? 'receipt' : 'payment',
    party: type==='sale' ? list[idx].customer : list[idx].vendor,
    amount, mode, note,
    refBillNo: list[idx].billNo,
    account: mode === 'Cash' ? 'Cash' : 'Bank'
  });

  setData(key, list);
  setData('cashbook', cashEntries);
  closeModal();
  showToast(`Payment of ${fmt(amount)} recorded!`);
  pages.outstanding();
}

function exportOutstanding() {
  const sales = getData('sales').filter(s=>(s.status||'unpaid')!=='paid')
    .map(s=>['Sale', s.billNo, s.date, s.customer, s.total, s.paidAmount||0, s.total-(s.paidAmount||0), s.status||'unpaid']);
  const purchases = getData('purchases').filter(p=>(p.status||'unpaid')!=='paid')
    .map(p=>['Purchase', p.billNo, p.date, p.vendor, p.total, p.paidAmount||0, p.total-(p.paidAmount||0), p.status||'unpaid']);
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([['Type','Bill No','Date','Party','Bill Amt','Paid','Due','Status'],...sales,...purchases]);
  XLSX.utils.book_append_sheet(wb, ws, 'Outstanding');
  XLSX.writeFile(wb, 'Outstanding_Dues.xlsx');
  showToast('Exported!');
}

pages.cashbook = function(acct) {
  setMeta('cashbook');
  acct = acct || 'Cash';

  const entries = getData('cashbook').filter(e => (e.account||'Cash') === acct)
    .sort((a,b) => a.date.localeCompare(b.date));

  const totalIn  = entries.filter(e=>e.type==='receipt'||e.type==='in').reduce((a,e)=>a+Number(e.amount||0),0);
  const totalOut = entries.filter(e=>e.type==='payment'||e.type==='out').reduce((a,e)=>a+Number(e.amount||0),0);
  const balance  = totalIn - totalOut;

  let running = 0;
  const rows = entries.length ? entries.map(e => {
    const isIn = e.type==='receipt'||e.type==='in';
    running += isIn ? Number(e.amount||0) : -Number(e.amount||0);
    return `<tr>
      <td>${fmtDate(e.date)}</td>
      <td><span class="badge ${isIn?'badge-success':'badge-danger'}">${isIn?'IN':'OUT'}</span></td>
      <td>${e.party||'—'}</td>
      <td>${e.mode||'Cash'}</td>
      <td>${e.note||e.refBillNo||'—'}</td>
      <td class="mono" style="color:var(--success)">${isIn?fmt(e.amount):'—'}</td>
      <td class="mono" style="color:var(--danger)">${!isIn?fmt(e.amount):'—'}</td>
      <td class="mono" style="font-weight:600;color:${running>=0?'var(--success)':'var(--danger)'}">${fmt(Math.abs(running))} ${running>=0?'Cr':'Dr'}</td>
      <td><button class="btn btn-danger btn-xs" onclick="deleteCashEntry('${e.id}')">Del</button></td>
    </tr>`;
  }).join('') : `<tr><td colspan="9"><div class="empty-state"><p>No entries yet. Record cash or bank transactions.</p></div></td></tr>`;

  document.getElementById('topbarActions').innerHTML = `<button class="btn btn-primary" onclick="openCashEntryForm('${acct}')">+ New Entry</button>`;

  document.getElementById('pageContent').innerHTML = `
    <div style="display:flex;gap:0;margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;width:fit-content">
      <button class="btn ${acct==='Cash'?'btn-primary':'btn-ghost'}" style="border-radius:0;border:none" onclick="pages.cashbook('Cash')">💵 Cash</button>
      <button class="btn ${acct==='Bank'?'btn-primary':'btn-ghost'}" style="border-radius:0;border:none;border-left:1px solid var(--border)" onclick="pages.cashbook('Bank')">🏦 Bank</button>
    </div>

    <div class="cards-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px">
      <div class="stat-card success"><div class="label">Total In</div><div class="value">${fmt(totalIn)}</div></div>
      <div class="stat-card danger"><div class="label">Total Out</div><div class="value">${fmt(totalOut)}</div></div>
      <div class="stat-card ${balance>=0?'accent':'danger'}"><div class="label">${acct} Balance</div><div class="value">${fmt(Math.abs(balance))}</div><div class="sub">${balance>=0?'Credit':'Deficit'}</div></div>
    </div>

    <div class="table-wrap">
      <div class="table-header"><h3>${acct} Register</h3></div>
      <table>
        <thead><tr><th>Date</th><th>Type</th><th>Party</th><th>Mode</th><th>Ref / Note</th><th>In (₹)</th><th>Out (₹)</th><th>Balance</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
};

function openCashEntryForm(acct) {
  const parties = getData('parties');
  const partyOpts = parties.map(p=>`<option value="${p.name}">${p.name}</option>`).join('');
  openModal('New ' + acct + ' Entry', `
    <div class="form-row cols-2">
      <div class="form-group">
        <label class="form-label">Date</label>
        <input class="form-control" type="date" id="ce_date" value="${today()}">
      </div>
      <div class="form-group">
        <label class="form-label">Type</label>
        <select class="form-control" id="ce_type">
          <option value="in">Money In (Receipt)</option>
          <option value="out">Money Out (Payment)</option>
        </select>
      </div>
    </div>
    <div class="form-row cols-2">
      <div class="form-group">
        <label class="form-label">Party / Description</label>
        <input class="form-control" id="ce_party" list="cePartyList" placeholder="Name or description">
        <datalist id="cePartyList">${partyOpts}</datalist>
      </div>
      <div class="form-group">
        <label class="form-label">Amount (₹)</label>
        <input class="form-control mono" id="ce_amount" type="number" min="0" step="any" placeholder="0.00">
      </div>
    </div>
    <div class="form-row cols-2">
      <div class="form-group">
        <label class="form-label">Mode</label>
        <select class="form-control" id="ce_mode">
          <option>Cash</option><option>Bank Transfer</option><option>UPI</option><option>Cheque</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Reference / Note</label>
        <input class="form-control" id="ce_note" placeholder="Bill no., UTR, note...">
      </div>
    </div>
  `, `
    <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveCashEntry('${acct}')">Save Entry</button>
  `);
}

function saveCashEntry(acct) {
  const date   = document.getElementById('ce_date').value;
  const type   = document.getElementById('ce_type').value;
  const party  = document.getElementById('ce_party').value.trim();
  const amount = parseFloat(document.getElementById('ce_amount').value||0);
  const mode   = document.getElementById('ce_mode').value;
  const note   = document.getElementById('ce_note').value.trim();

  if (!amount || amount <= 0) return showToast('Enter a valid amount', 'error');

  const entries = getData('cashbook');
  entries.push({ id: uid(), date, type, party, amount, mode, note, account: acct });
  setData('cashbook', entries);
  closeModal();
  showToast('Entry saved!');
  pages.cashbook(acct);
}

function deleteCashEntry(id) {
  confirmAction('Delete this cash/bank entry?', () => {
    setData('cashbook', getData('cashbook').filter(e=>e.id!==id));
    showToast('Entry deleted');
    pages.cashbook();
  });
}

pages.daybook = function(dateVal) {
  setMeta('daybook');
  dateVal = dateVal || today();

  const sales     = getData('sales').filter(s=>s.date===dateVal);
  const purchases = getData('purchases').filter(p=>p.date===dateVal);
  const returns   = getData('returns').filter(r=>r.date===dateVal);
  const cashbook  = getData('cashbook').filter(e=>e.date===dateVal);

  const totalSales = sales.reduce((a,s)=>a+Number(s.total||0),0);
  const totalPurch = purchases.reduce((a,p)=>a+Number(p.total||0),0);
  const totalRet   = returns.reduce((a,r)=>a+Number(r.amount||0),0);
  const cashIn     = cashbook.filter(e=>e.type==='receipt'||e.type==='in').reduce((a,e)=>a+Number(e.amount||0),0);
  const cashOut    = cashbook.filter(e=>e.type==='payment'||e.type==='out').reduce((a,e)=>a+Number(e.amount||0),0);

  // Build unified ledger for the day
  let allTxns = [
    ...sales.map(s=>({ time:'', icon:'🧾', type:'Sale Invoice', ref:s.billNo, party:s.customer, in:s.total, out:0, note:s.items?.length+' items' })),
    ...purchases.map(p=>({ time:'', icon:'📦', type:'Purchase Bill', ref:p.billNo, party:p.vendor, in:0, out:p.total, note:p.items?.length+' items' })),
    ...returns.map(r=>({ time:'', icon:'↩', type:r.type==='credit'?'Credit Note':'Debit Note', ref:r.noteNo||'—', party:r.partyName, in:r.type==='debit'?r.amount:0, out:r.type==='credit'?r.amount:0, note:r.reason||'' })),
    ...cashbook.map(e=>({ time:'', icon:e.type==='receipt'||e.type==='in'?'💵':'💸', type:e.type==='receipt'||e.type==='in'?'Cash In':'Cash Out', ref:e.note||e.refBillNo||'—', party:e.party||'—', in:e.type==='receipt'||e.type==='in'?e.amount:0, out:e.type==='payment'||e.type==='out'?e.amount:0, note:e.mode||'' }))
  ];

  const dayRows = allTxns.length ? allTxns.map(t=>`
    <tr>
      <td style="font-size:16px;text-align:center">${t.icon}</td>
      <td><span class="badge badge-muted">${t.type}</span></td>
      <td class="mono">${t.ref}</td>
      <td><strong>${t.party}</strong></td>
      <td class="mono" style="color:var(--success)">${t.in>0?fmt(t.in):'—'}</td>
      <td class="mono" style="color:var(--danger)">${t.out>0?fmt(t.out):'—'}</td>
      <td style="color:var(--text-muted);font-size:12px">${t.note}</td>
    </tr>`).join('') : `<tr><td colspan="7"><div class="empty-state"><p>No transactions on this date.</p></div></td></tr>`;

  document.getElementById('topbarActions').innerHTML = `
    <button class="btn btn-outline btn-sm" onclick="exportDayBook('${dateVal}')">⬇ Export</button>
  `;

  document.getElementById('pageContent').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;background:var(--surface);padding:14px 20px;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);flex-wrap:wrap">
      <label class="form-label" style="margin:0">Date:</label>
      <input class="form-control" type="date" id="db_date" value="${dateVal}" style="width:180px" onchange="pages.daybook(this.value)">
      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="btn btn-ghost btn-sm" onclick="pages.daybook(offsetDate('${dateVal}',-1))">◀ Prev</button>
        <button class="btn btn-ghost btn-sm" onclick="pages.daybook('${today()}')">Today</button>
        <button class="btn btn-ghost btn-sm" onclick="pages.daybook(offsetDate('${dateVal}',1))">Next ▶</button>
      </div>
    </div>

    <div class="cards-grid" style="grid-template-columns:repeat(5,1fr);margin-bottom:20px">
      <div class="stat-card accent"><div class="label">Sales</div><div class="value" style="font-size:18px">${fmt(totalSales)}</div><div class="sub">${sales.length} bills</div></div>
      <div class="stat-card"><div class="label">Purchases</div><div class="value" style="font-size:18px">${fmt(totalPurch)}</div><div class="sub">${purchases.length} bills</div></div>
      <div class="stat-card"><div class="label">Returns</div><div class="value" style="font-size:18px">${fmt(totalRet)}</div><div class="sub">${returns.length} notes</div></div>
      <div class="stat-card success"><div class="label">Cash In</div><div class="value" style="font-size:18px">${fmt(cashIn)}</div></div>
      <div class="stat-card danger"><div class="label">Cash Out</div><div class="value" style="font-size:18px">${fmt(cashOut)}</div></div>
    </div>

    <div class="table-wrap">
      <div class="table-header"><h3>All Transactions — ${fmtDate(dateVal)}</h3><span style="font-size:12px;color:var(--text-muted)">${allTxns.length} entries</span></div>
      <table>
        <thead><tr><th></th><th>Type</th><th>Ref</th><th>Party</th><th>In (₹)</th><th>Out (₹)</th><th>Note</th></tr></thead>
        <tbody>${dayRows}</tbody>
        ${allTxns.length ? `<tfoot><tr class="total-row">
          <td colspan="4">Day Total</td>
          <td class="mono" style="color:var(--success)">${fmt(allTxns.reduce((a,t)=>a+t.in,0))}</td>
          <td class="mono" style="color:var(--danger)">${fmt(allTxns.reduce((a,t)=>a+t.out,0))}</td>
          <td></td>
        </tr></tfoot>` : ''}
      </table>
    </div>
  `;
};

function offsetDate(dateStr, days) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}

function exportDayBook(dateVal) {
  const sales     = getData('sales').filter(s=>s.date===dateVal);
  const purchases = getData('purchases').filter(p=>p.date===dateVal);
  const returns   = getData('returns').filter(r=>r.date===dateVal);
  const cashbook  = getData('cashbook').filter(e=>e.date===dateVal);
  const rows = [['Type','Ref','Party','In','Out','Note']];
  sales.forEach(s=>rows.push(['Sale Invoice',s.billNo,s.customer,s.total,'',s.items?.length+' items']));
  purchases.forEach(p=>rows.push(['Purchase Bill',p.billNo,p.vendor,'',p.total,p.items?.length+' items']));
  returns.forEach(r=>rows.push([r.type==='credit'?'Credit Note':'Debit Note',r.noteNo||'',r.partyName,r.type==='debit'?r.amount:'',r.type==='credit'?r.amount:'',r.reason||'']));
  cashbook.forEach(e=>rows.push([e.type==='receipt'||e.type==='in'?'Cash In':'Cash Out',e.note||'',e.party||'',e.type==='receipt'||e.type==='in'?e.amount:'',e.type==='payment'||e.type==='out'?e.amount:'',e.mode||'']));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), 'Day Book');
  XLSX.writeFile(wb, 'DayBook_'+dateVal+'.xlsx');
  showToast('Day Book exported!');
}

pages.pnl = function() {
  setMeta('pnl');
  const now = new Date();
  const fyStart = now.getMonth() >= 3
    ? `${now.getFullYear()}-04-01`
    : `${now.getFullYear()-1}-04-01`;
  const fyEnd = today();

  document.getElementById('pageContent').innerHTML = `
    <div class="report-month-bar" style="flex-wrap:wrap;gap:10px">
      <label class="form-label" style="margin:0">From:</label>
      <input class="form-control" type="date" id="pl_from" value="${fyStart}" style="width:160px">
      <label class="form-label" style="margin:0">To:</label>
      <input class="form-control" type="date" id="pl_to" value="${fyEnd}" style="width:160px">
      <button class="btn btn-primary" onclick="generatePnL()">Generate P&L</button>
      <button class="btn btn-outline" onclick="exportPnL()">⬇ Export</button>
    </div>
    <div id="plResult"></div>
  `;
  generatePnL();
};

function generatePnL() {
  const from = document.getElementById('pl_from')?.value;
  const to   = document.getElementById('pl_to')?.value;
  if (!from || !to) return;

  const sales     = getData('sales').filter(s=>s.date>=from&&s.date<=to);
  const purchases = getData('purchases').filter(p=>p.date>=from&&p.date<=to);
  const returns   = getData('returns').filter(r=>r.date>=from&&r.date<=to);
  const cashbook  = getData('cashbook').filter(e=>e.date>=from&&e.date<=to);

  const totalSales    = sales.reduce((a,s)=>a+Number(s.total||0),0);
  const salesReturns  = returns.filter(r=>r.type==='credit').reduce((a,r)=>a+Number(r.amount||0),0);
  const netSales      = totalSales - salesReturns;

  const totalPurch    = purchases.reduce((a,p)=>a+Number(p.total||0),0);
  const purchReturns  = returns.filter(r=>r.type==='debit').reduce((a,r)=>a+Number(r.amount||0),0);
  const netPurch      = totalPurch - purchReturns;

  const grossProfit   = netSales - netPurch;
  const grossPct      = netSales > 0 ? (grossProfit/netSales*100).toFixed(1) : '0.0';

  // Other expenses/income from cashbook manual entries (not linked to bills)
  const otherIncome   = cashbook.filter(e=>(e.type==='in')&&!e.refBillNo).reduce((a,e)=>a+Number(e.amount||0),0);
  const otherExpenses = cashbook.filter(e=>(e.type==='out')&&!e.refBillNo).reduce((a,e)=>a+Number(e.amount||0),0);

  const netProfit = grossProfit + otherIncome - otherExpenses;
  const netPct    = netSales > 0 ? (netProfit/netSales*100).toFixed(1) : '0.0';

  // Month-wise breakdown
  const months = {};
  sales.forEach(s => {
    const m = s.date.slice(0,7);
    if (!months[m]) months[m] = { sales:0, purch:0 };
    months[m].sales += Number(s.total||0);
  });
  purchases.forEach(p => {
    const m = p.date.slice(0,7);
    if (!months[m]) months[m] = { sales:0, purch:0 };
    months[m].purch += Number(p.total||0);
  });
  const monthRows = Object.entries(months).sort((a,b)=>a[0].localeCompare(b[0])).map(([m,v])=>{
    const gp = v.sales - v.purch;
    return `<tr>
      <td>${m}</td>
      <td class="mono">${fmt(v.sales)}</td>
      <td class="mono">${fmt(v.purch)}</td>
      <td class="mono" style="font-weight:700;color:${gp>=0?'var(--success)':'var(--danger)'}">${fmt(gp)}</td>
      <td class="mono" style="color:var(--text-muted)">${v.sales>0?(gp/v.sales*100).toFixed(1)+'%':'—'}</td>
    </tr>`;
  }).join('');

  function plRow(label, value, indent=false, bold=false, color='') {
    return `<tr>
      <td style="${indent?'padding-left:28px':''};${bold?'font-weight:700':''}">${label}</td>
      <td></td>
      <td class="mono" style="font-weight:${bold?700:400};color:${color||'inherit'}">${fmt(value)}</td>
    </tr>`;
  }
  function plDivider(label) {
    return `<tr style="background:#f8fafc"><td colspan="3" style="font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted);padding:10px 16px">${label}</td></tr>`;
  }

  document.getElementById('plResult').innerHTML = `
    <div class="cards-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
      <div class="stat-card accent"><div class="label">Net Sales</div><div class="value">${fmt(netSales)}</div></div>
      <div class="stat-card"><div class="label">Cost of Purchase</div><div class="value">${fmt(netPurch)}</div></div>
      <div class="stat-card ${grossProfit>=0?'success':'danger'}">
        <div class="label">Gross Profit</div><div class="value">${fmt(grossProfit)}</div>
        <div class="sub">Margin: ${grossPct}%</div>
      </div>
      <div class="stat-card ${netProfit>=0?'success':'danger'}">
        <div class="label">Net Profit</div><div class="value">${fmt(netProfit)}</div>
        <div class="sub">Margin: ${netPct}%</div>
      </div>
    </div>

    <div class="two-col">
      <div class="table-wrap">
        <div class="table-header"><h3>Profit & Loss Statement</h3><span style="font-size:12px;color:var(--text-muted)">${fmtDate(from)} – ${fmtDate(to)}</span></div>
        <table>
          <thead><tr><th>Particulars</th><th></th><th style="text-align:right">Amount</th></tr></thead>
          <tbody>
            ${plDivider('Income')}
            ${plRow('Gross Sales', totalSales, true)}
            ${plRow('Less: Sales Returns', salesReturns, true)}
            ${plRow('Net Sales', netSales, false, true, 'var(--accent)')}
            ${otherIncome > 0 ? plRow('Other Income', otherIncome, true) : ''}
            ${plDivider('Cost of Goods')}
            ${plRow('Total Purchases', totalPurch, true)}
            ${plRow('Less: Purchase Returns', purchReturns, true)}
            ${plRow('Net Purchases (COGS)', netPurch, false, true)}
            ${plDivider('Profit')}
            ${plRow('Gross Profit', grossProfit, false, true, grossProfit>=0?'var(--success)':'var(--danger)')}
            ${otherExpenses > 0 ? plRow('Less: Other Expenses', otherExpenses, true, false, 'var(--danger)') : ''}
            ${plRow('NET PROFIT / LOSS', netProfit, false, true, netProfit>=0?'var(--success)':'var(--danger)')}
          </tbody>
        </table>
      </div>

      <div class="table-wrap">
        <div class="table-header"><h3>Month-wise Breakdown</h3></div>
        <table>
          <thead><tr><th>Month</th><th>Sales</th><th>Purchase</th><th>Gross Profit</th><th>Margin</th></tr></thead>
          <tbody>${monthRows||`<tr><td colspan="5"><div class="empty-state"><p>No data</p></div></td></tr>`}</tbody>
        </table>
      </div>
    </div>
  `;
}

function exportPnL() {
  const from = document.getElementById('pl_from')?.value;
  const to   = document.getElementById('pl_to')?.value;
  if (!from||!to) return;

  const sales     = getData('sales').filter(s=>s.date>=from&&s.date<=to);
  const purchases = getData('purchases').filter(p=>p.date>=from&&p.date<=to);
  const returns   = getData('returns').filter(r=>r.date>=from&&r.date<=to);

  const totalSales   = sales.reduce((a,s)=>a+Number(s.total||0),0);
  const salesRet     = returns.filter(r=>r.type==='credit').reduce((a,r)=>a+Number(r.amount||0),0);
  const totalPurch   = purchases.reduce((a,p)=>a+Number(p.total||0),0);
  const purchRet     = returns.filter(r=>r.type==='debit').reduce((a,r)=>a+Number(r.amount||0),0);
  const grossProfit  = (totalSales-salesRet) - (totalPurch-purchRet);

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([
    ['Profit & Loss Statement', '', from + ' to ' + to],
    [''],
    ['Particulars','','Amount'],
    ['Gross Sales','',totalSales],
    ['Less: Sales Returns','',salesRet],
    ['Net Sales','',totalSales-salesRet],
    [''],
    ['Total Purchases','',totalPurch],
    ['Less: Purchase Returns','',purchRet],
    ['Net Purchases (COGS)','',totalPurch-purchRet],
    [''],
    ['GROSS PROFIT','',grossProfit],
  ]);
  XLSX.utils.book_append_sheet(wb, ws, 'P&L');
  XLSX.writeFile(wb, 'PnL_'+from+'_to_'+to+'.xlsx');
  showToast('P&L exported!');
}



// ═══════════════════════════════════════════════════════════
//  MIGRATION: Add openingStock field to existing items
// ═══════════════════════════════════════════════════════════
function migrateOpeningStock() {
  const items     = getData('items');
  const sales     = getData('sales');
  const purchases = getData('purchases');
  let changed = false;

  items.forEach(item => {
    if (item.openingStock === undefined) {
      // Calculate how much was purchased and sold for this item
      let totalPurchased = 0, totalSold = 0;
      purchases.forEach(p => (p.items||[]).forEach(pi => {
        if (pi.name === item.name) totalPurchased += Number(pi.qty||0);
      }));
      sales.forEach(s => (s.items||[]).forEach(si => {
        if (si.name === item.name) totalSold += Number(si.qty||0);
      }));
      // Reconstruct opening stock from current stock
      item.openingStock = Number(item.stock||0) - totalPurchased + totalSold;
      changed = true;
    }
  });

  if (changed) setData('items', items);
}

loadSampleData();
